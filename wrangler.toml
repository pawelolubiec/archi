# Static SPA + Worker API — build with `npm run build`, then `wrangler deploy`.
name = "archi"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "archi"
database_id = "453d475c-06df-4ab6-936d-df812f3a76da"
migrations_dir = "migrations"
